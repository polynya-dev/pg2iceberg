services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: rideshare
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5502:5432"
    volumes:
      - ./schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ./seed.sql:/docker-entrypoint-initdb.d/02-seed.sql
      - pgdata:/var/lib/postgresql/data
    command: ["postgres", "-c", "wal_level=logical", "-c", "max_replication_slots=4", "-c", "max_wal_senders=4"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 2s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: password
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 2s
      timeout: 5s
      retries: 5

  create-bucket:
    image: minio/mc
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set myminio http://minio:9000 admin password;
      mc mb --ignore-existing myminio/warehouse;
      exit 0;
      "

  iceberg-postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: iceberg_catalog
      POSTGRES_USER: iceberg
      POSTGRES_PASSWORD: iceberg
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U iceberg"]
      interval: 2s
      timeout: 5s
      retries: 10

  iceberg-rest:
    build: ./iceberg-rest
    environment:
      AWS_ACCESS_KEY_ID: admin
      AWS_SECRET_ACCESS_KEY: password
      AWS_REGION: us-east-1
      CATALOG_CATALOG__IMPL: org.apache.iceberg.jdbc.JdbcCatalog
      CATALOG_URI: jdbc:postgresql://iceberg-postgres:5432/iceberg_catalog
      CATALOG_JDBC_USER: iceberg
      CATALOG_JDBC_PASSWORD: iceberg
      CATALOG_WAREHOUSE: s3://warehouse/
      CATALOG_IO__IMPL: org.apache.iceberg.aws.s3.S3FileIO
      CATALOG_S3_ENDPOINT: http://minio:9000
      CATALOG_S3_PATH__STYLE__ACCESS: "true"
    ports:
      - "8181:8181"
    depends_on:
      iceberg-postgres:
        condition: service_healthy
      create-bucket:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8181/v1/config || exit 1"]
      interval: 3s
      timeout: 5s
      retries: 10

  pg2iceberg:
    build:
      context: ../..
      dockerfile: Dockerfile
    environment:
      POSTGRES_URL: postgresql://postgres:postgres@postgres:5432/rideshare
      TABLES: public.riders,public.drivers,public.rides,public.payments,public.ratings
      ICEBERG_CATALOG_URL: http://iceberg-rest:8181
      WAREHOUSE: s3://warehouse/
      NAMESPACE: rideshare
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: admin
      S3_SECRET_KEY: password
    ports:
      - "9091:9090"
    depends_on:
      postgres:
        condition: service_healthy
      iceberg-rest:
        condition: service_healthy

  clickhouse:
    image: clickhouse/clickhouse-server:26.2
    ports:
      - "8123:8123"
    environment:
      AWS_ACCESS_KEY_ID: admin
      AWS_SECRET_ACCESS_KEY: password
    volumes:
      - ./clickhouse/config.xml:/etc/clickhouse-server/config.d/s3.xml
      - ./clickhouse/users.xml:/etc/clickhouse-server/users.d/iceberg.xml
      - ./clickhouse/init.sql:/docker-entrypoint-initdb.d/init.sql
    depends_on:
      iceberg-rest:
        condition: service_healthy

  prometheus:
    image: prom/prometheus:v3.4.1
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    depends_on:
      pg2iceberg:
        condition: service_started

  grafana:
    image: grafana/grafana:11.6.0
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning
      - ./grafana/dashboards:/var/lib/grafana/dashboards
    ports:
      - "3001:3000"
    depends_on:
      - prometheus

  simulate:
    image: python:3.12-slim
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/rideshare
    volumes:
      - ./simulate.py:/app/simulate.py
      - ../../scripts/requirements.txt:/app/requirements.txt
    working_dir: /app
    command: sh -c "pip install -q -r requirements.txt && python simulate.py --interval 5"

volumes:
  pgdata:
