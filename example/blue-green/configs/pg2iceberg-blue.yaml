tables:
  - name: public.accounts
  - name: public.transfers

source:
  mode: logical
  postgres:
    host: blue-postgres
    port: 5432
    database: app
    user: postgres
    password: postgres
  logical:
    publication_name: pg2iceberg_blue_pub
    slot_name: pg2iceberg_blue_slot

sink:
  catalog_uri: http://iceberg-rest:8181
  warehouse: s3://warehouse/
  # Distinct namespace so blue's Iceberg output never collides with green's.
  namespace: app_blue
  # Meta tables (including the markers index) land in a namespace keyed to
  # the source cluster. The verifier diffs app_blue.* and app_green.* using
  # _pg2iceberg_blue.markers and _pg2iceberg_green.markers.
  meta_namespace: _pg2iceberg_blue
  s3_endpoint: http://minio:9000
  s3_access_key: admin
  s3_secret_key: password
  s3_region: us-east-1
  flush_interval: 2s
  flush_rows: 200
  materializer_interval: 2s

state: {}
