services:
  # ── Source clusters ────────────────────────────────────────────────────
  # blue is the original primary. Seeded with initial data; receives all
  # application writes. green is a logical replica of blue.

  blue-postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: app
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5610:5432"
    volumes:
      - ./schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ./seed.sql:/docker-entrypoint-initdb.d/02-seed.sql
    command:
      - postgres
      - -c
      - wal_level=logical
      - -c
      - max_replication_slots=8
      - -c
      - max_wal_senders=8
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d app"]
      interval: 2s
      timeout: 5s
      retries: 15

  green-postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: app
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5611:5432"
    volumes:
      # Same schema as blue — needs to match because PG logical replication
      # does not ship DDL. Seed is NOT applied here; rows arrive via the
      # bluegreen subscription.
      - ./schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    command:
      - postgres
      - -c
      - wal_level=logical
      - -c
      - max_replication_slots=8
      - -c
      - max_wal_senders=8
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d app"]
      interval: 2s
      timeout: 5s
      retries: 15

  # ── Replication bootstrap ──────────────────────────────────────────────
  # Runs once after both clusters are healthy. Creates the bluegreen
  # publication on blue, the subscription on green, and waits for the
  # seed data to replicate over.

  bootstrap-replication:
    image: postgres:16-alpine
    depends_on:
      blue-postgres: { condition: service_healthy }
      green-postgres: { condition: service_healthy }
    volumes:
      - ./scripts/bootstrap-replication.sh:/bootstrap.sh
    entrypoint: ["/bin/sh", "/bootstrap.sh"]
    environment:
      BLUE_DSN: postgresql://postgres:postgres@blue-postgres:5432/app
      GREEN_DSN: postgresql://postgres:postgres@green-postgres:5432/app
      # The CONNECTION that green uses to pull from blue. From green's
      # container this is resolvable as blue-postgres.
      GREEN_TO_BLUE_DSN: host=blue-postgres port=5432 dbname=app user=postgres password=postgres

  # ── Iceberg catalog + object storage (shared) ──────────────────────────

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: password
    ports:
      - "9610:9000"
      - "9611:9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 2s
      timeout: 5s
      retries: 5

  create-bucket:
    image: minio/mc
    depends_on:
      minio: { condition: service_healthy }
    entrypoint: >
      /bin/sh -c "
      mc alias set myminio http://minio:9000 admin password;
      mc mb --ignore-existing myminio/warehouse;
      exit 0;
      "

  iceberg-postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: iceberg_catalog
      POSTGRES_USER: iceberg
      POSTGRES_PASSWORD: iceberg
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U iceberg"]
      interval: 2s
      timeout: 5s
      retries: 10

  iceberg-rest:
    # Reuse the same REST catalog image as the single example.
    build: ../../single/iceberg-rest
    environment:
      AWS_ACCESS_KEY_ID: admin
      AWS_SECRET_ACCESS_KEY: password
      AWS_REGION: us-east-1
      CATALOG_CATALOG__IMPL: org.apache.iceberg.jdbc.JdbcCatalog
      CATALOG_URI: jdbc:postgresql://iceberg-postgres:5432/iceberg_catalog
      CATALOG_JDBC_USER: iceberg
      CATALOG_JDBC_PASSWORD: iceberg
      CATALOG_WAREHOUSE: s3://warehouse/
      CATALOG_IO__IMPL: org.apache.iceberg.aws.s3.S3FileIO
      CATALOG_S3_ENDPOINT: http://minio:9000
      CATALOG_S3_PATH__STYLE__ACCESS: "true"
    ports:
      - "8181:8181"
    depends_on:
      iceberg-postgres:  { condition: service_healthy }
      create-bucket:     { condition: service_completed_successfully }
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8181/v1/config || exit 1"]
      interval: 3s
      timeout: 5s
      retries: 10

  # ── Two pg2iceberg instances, one per source cluster ───────────────────
  # Each writes to its own Iceberg namespace so they never contend on the
  # same catalog entries.

  pg2iceberg-blue:
    build:
      context: ../../pg2iceberg
      dockerfile: Dockerfile
    depends_on:
      bootstrap-replication: { condition: service_completed_successfully }
      iceberg-rest:          { condition: service_healthy }
    volumes:
      - ./configs/pg2iceberg-blue.yaml:/etc/pg2iceberg/config.yaml:ro
    command: ["--config", "/etc/pg2iceberg/config.yaml"]
    environment:
      AWS_ACCESS_KEY_ID: admin
      AWS_SECRET_ACCESS_KEY: password

  pg2iceberg-green:
    build:
      context: ../../pg2iceberg
      dockerfile: Dockerfile
    depends_on:
      bootstrap-replication: { condition: service_completed_successfully }
      iceberg-rest:          { condition: service_healthy }
    volumes:
      - ./configs/pg2iceberg-green.yaml:/etc/pg2iceberg/config.yaml:ro
    command: ["--config", "/etc/pg2iceberg/config.yaml"]
    environment:
      AWS_ACCESS_KEY_ID: admin
      AWS_SECRET_ACCESS_KEY: password

  # ── Traffic simulator (writes to blue only) ────────────────────────────

  simulate:
    image: python:3.12-slim
    depends_on:
      blue-postgres: { condition: service_healthy }
    volumes:
      - ./scripts/simulate.py:/app/simulate.py
    working_dir: /app
    environment:
      DATABASE_URL: postgresql://postgres:postgres@blue-postgres:5432/app
    command: sh -c "pip install -q psycopg[binary]==3.2.3 && python simulate.py --interval 1.0"
