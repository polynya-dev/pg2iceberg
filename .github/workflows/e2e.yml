name: E2E

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0

jobs:
  e2e:
    name: tests/run.sh
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          # Separate cache from the build-test / integration jobs so
          # this prod-feature release build doesn't evict their caches.
          key: e2e

      - name: Install DuckDB CLI
        # A handful of cases verify their output via DuckDB instead of
        # ClickHouse (opt-in per case via a `__engine` marker file) when
        # the type round-trip on the ClickHouse side is buggy — UUID is
        # the original motivating example. Pin the version so the
        # Iceberg-extension wire format stays stable across runs.
        run: |
          DUCKDB_VERSION=v1.5.2
          curl -fsSL -o /tmp/duckdb.zip \
            "https://github.com/duckdb/duckdb/releases/download/${DUCKDB_VERSION}/duckdb_cli-linux-amd64.zip"
          sudo unzip -o /tmp/duckdb.zip -d /usr/local/bin
          duckdb --version

      - name: Bring up the test stack
        working-directory: tests
        run: |
          docker compose up -d --wait
          # Extra wait: iceberg-rest can answer /v1/config before its
          # JDBC pool is fully primed, which races the first table
          # create. ClickHouse's initdb runs async too.
          for i in $(seq 1 30); do
            curl -sf http://localhost:8181/v1/config >/dev/null 2>&1 \
              && curl -sf http://localhost:8123 --data-binary "SELECT 1" >/dev/null 2>&1 \
              && break
            sleep 2
          done

      - name: Build pg2iceberg (release, --features prod)
        run: cargo build --release --features prod --bin pg2iceberg

      - name: Run e2e suite
        env:
          PARALLEL: "1"
        run: ./tests/run.sh

      - name: Show stack logs on failure
        if: failure()
        working-directory: tests
        run: docker compose logs --tail=100
