tables:
  - name: public.bench_events
    iceberg:
      partition:
        - truncate[100000](seq)

source:
  mode: logical

  postgres:
    host: postgres
    port: 5432
    database: bench
    user: postgres
    password: postgres

  logical:
    publication_name: pg2iceberg_bench
    slot_name: pg2iceberg_bench_slot

sink:
  catalog_uri: http://iceberg-rest:8181
  warehouse: s3://warehouse/
  namespace: benchmark
  s3_endpoint: http://minio:9000
  s3_access_key: admin
  s3_secret_key: password
  s3_region: us-east-1
  flush_interval: 10s
  flush_rows: 50000
  flush_bytes: 67108864
  # toast_cache_bytes: 4294967296
  materializer_interval: 30s

state: {}

metrics_addr: ":9090"
