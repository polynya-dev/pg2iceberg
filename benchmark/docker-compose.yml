services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: bench
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5532:5432"
    volumes:
      - ./schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - pgdata:/var/lib/postgresql/data
    command:
      - "postgres"
      - "-c"
      - "wal_level=logical"
      - "-c"
      - "max_replication_slots=4"
      - "-c"
      - "max_wal_senders=4"
      # Tuning for bulk insert throughput.
      - "-c"
      - "shared_buffers=512MB"
      - "-c"
      - "wal_buffers=64MB"
      - "-c"
      - "max_wal_size=4GB"
      - "-c"
      - "checkpoint_timeout=30min"
    shm_size: "1g"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 2s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: password
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 2s
      timeout: 5s
      retries: 5

  create-bucket:
    image: minio/mc
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set myminio http://minio:9000 admin password;
      mc mb --ignore-existing myminio/warehouse;
      exit 0;
      "

  iceberg-postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: iceberg_catalog
      POSTGRES_USER: iceberg
      POSTGRES_PASSWORD: iceberg
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U iceberg"]
      interval: 2s
      timeout: 5s
      retries: 10

  iceberg-rest:
    build: ../example/single/iceberg-rest
    environment:
      AWS_ACCESS_KEY_ID: admin
      AWS_SECRET_ACCESS_KEY: password
      AWS_REGION: us-east-1
      CATALOG_CATALOG__IMPL: org.apache.iceberg.jdbc.JdbcCatalog
      CATALOG_URI: jdbc:postgresql://iceberg-postgres:5432/iceberg_catalog
      CATALOG_JDBC_USER: iceberg
      CATALOG_JDBC_PASSWORD: iceberg
      CATALOG_WAREHOUSE: s3://warehouse/
      CATALOG_IO__IMPL: org.apache.iceberg.aws.s3.S3FileIO
      CATALOG_S3_ENDPOINT: http://minio:9000
      CATALOG_S3_PATH__STYLE__ACCESS: "true"
    ports:
      - "8181:8181"
    depends_on:
      iceberg-postgres:
        condition: service_healthy
      create-bucket:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8181/v1/config || exit 1"]
      interval: 3s
      timeout: 5s
      retries: 10

  pg2iceberg:
    build:
      context: ..
      dockerfile: Dockerfile
    volumes:
      - ./pg2iceberg.yaml:/etc/pg2iceberg/config.yaml
    command: ["--config", "/etc/pg2iceberg/config.yaml"]
    ports:
      - "9090:9090"
      - "6061:6060"
    depends_on:
      postgres:
        condition: service_healthy
      iceberg-rest:
        condition: service_healthy
    environment:
      PPROF: 1
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9090/metrics || exit 1"]
      interval: 3s
      timeout: 5s
      retries: 10

  prometheus:
    image: prom/prometheus:v3.4.1
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9091:9090"
    depends_on:
      pg2iceberg:
        condition: service_healthy

  grafana:
    image: grafana/grafana:11.6.0
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning
      - ./grafana/dashboards:/var/lib/grafana/dashboards
    ports:
      - "3001:3000"
    depends_on:
      - prometheus

  bench-writer:
    build:
      context: ..
      dockerfile: benchmark/Dockerfile.bench
      target: bench-writer
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/bench
    ports:
      - "6060:6060"
    depends_on:
      postgres:
        condition: service_healthy
    # Override in run.sh: command decides seed vs stream mode.
    command: ["--help"]

  bench-verify:
    build:
      context: ..
      dockerfile: benchmark/Dockerfile.bench
      target: bench-verify
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/bench
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: admin
      S3_SECRET_KEY: password
      S3_REGION: us-east-1
      CATALOG_URI: http://iceberg-rest:8181
      WAREHOUSE: s3://warehouse/
      NAMESPACE: benchmark
      TABLE: bench_events
      AWS_ACCESS_KEY_ID: admin
      AWS_SECRET_ACCESS_KEY: password
      AWS_REGION: us-east-1
      AWS_ENDPOINT_URL: http://minio:9000
      AWS_S3_FORCE_PATH_STYLE: "true"
    depends_on:
      iceberg-rest:
        condition: service_healthy
      postgres:
        condition: service_healthy
    command: ["--help"]

volumes:
  pgdata:
