tables:
  - name: public.orders
  # - name: public.event_log
  #   skip_snapshot: true    # logical mode: skip initial snapshot, only stream WAL changes
  #   iceberg:
  #     partition:
  #       - day(created_at)       # partition by day on a timestamp column
  #       - region                # partition by identity on a string column
  #       # Also supported: year(), month(), hour(), bucket[N](), truncate[W]()
  #       # - bucket[16](id)      # hash-based bucketing into 16 partitions
  #       # - truncate[4](name)   # truncate string to first 4 characters

  # Query mode options (used when source.mode=query):
  # - name: public.orders
  #   primary_key: [id]
  #   watermark_column: updated_at

source:
  # "query" or "logical"
  mode: logical

  postgres:
    host: localhost
    port: 5434
    database: testdb
    user: postgres
    password: postgres

  # Query mode settings (used when mode=query)
  query:
    poll_interval: 5s

  # Logical replication settings (used when mode=logical)
  logical:
    publication_name: pg2iceberg_pub
    slot_name: pg2iceberg_slot
    # standby_interval: 10s          # how often to send standby status to PG (default: 10s)
    # snapshot_chunk_pages: 2048      # CTID pages per chunk during initial snapshot (default: 2048, ~16MB)
    # snapshot_target_file_size: 134217728  # target parquet file size for snapshot writes (default: 128MB)

sink:
  catalog_uri: http://localhost:8181

  # Catalog authentication mode: "sigv4" (AWS Glue), "bearer" (R2, Databricks), or empty (none).
  # catalog_auth: sigv4
  #   catalog_uri: https://glue.us-east-1.amazonaws.com/iceberg
  # catalog_auth: bearer
  #   catalog_token: "your-api-token"

  # Credential mode: "static" (default) uses explicit S3 keys below.
  # "vended" uses temporary credentials provided by the catalog (LoadTable response).
  # When vended, s3_endpoint/s3_access_key/s3_secret_key/warehouse can be omitted.
  # credential_mode: vended

  warehouse: s3://warehouse/
  namespace: default
  s3_endpoint: http://localhost:9000
  s3_access_key: admin
  s3_secret_key: password
  s3_region: us-east-1
  flush_interval: 10s
  flush_rows: 1000
  flush_bytes: 67108864        # 64MB - flush when buffered bytes exceed this
  target_file_size: 134217728  # 128MB - max parquet file size before rolling

  # Materializer settings (merges change events into flattened tables)
  # materializer_interval: 10s  # how often to run materialization (default: 10s)

  # Compaction settings (used by materializer for target file size)
  # compaction_target_size: 268435456  # 256MB - target merged file size

  # Control-plane metadata tables (commits + checkpoints) written to a
  # separate Iceberg namespace for customer-facing observability. Rows are
  # piggybacked on the data commit so they're atomically consistent.
  # meta_enabled: true          # default: true
  # meta_namespace: _pg2iceberg # default: _pg2iceberg

# State checkpoint storage.
# By default, checkpoints are stored in the source postgres under the _pg2iceberg schema.
# To use a separate postgres, set postgres_url. To use a local file (dev only), set path.
state:
  # postgres_url: postgresql://user:pass@host:5432/db?sslmode=disable
  # path: ./pg2iceberg-state.json
  # coordinator_schema: _pg2iceberg  # PG schema for coordination tables (default: _pg2iceberg)
